name: 'Unit Tests - install-jq-action scripts'

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'tests/unit/**'
      - '.github/workflows/unit-tests.yaml'

  pull_request:
    branches:
      - main

permissions:
  actions: none
  attestations: none
  checks: none
  contents: read
  deployments: none
  id-token: none
  issues: none
  models: none
  discussions: none
  packages: none
  pages: none
  pull-requests: none
  security-events: none
  statuses: none

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  unit-tests:
    name: "Unit Tests (sh) - ${{ matrix.os }}"
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - macos-14
          - macos-15
          - macos-26
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Version validation tests
        run: sh tests/unit/test-version-validation.sh

      - name: Arch mapping tests
        run: sh tests/unit/test-arch-mapping.sh
