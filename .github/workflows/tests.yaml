name: 'Tests - Setup jq Action'

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'action.yaml'
      - '.github/workflows/tests.yaml'
      - 'scripts/**'
      - 'tests/unit/**'

  pull_request:
    branches:
      - main

permissions:
  actions: none
  attestations: none
  checks: none
  contents: read
  deployments: none
  id-token: none
  issues: none
  models: none
  discussions: none
  packages: none
  pages: none
  pull-requests: none
  security-events: none
  statuses: none

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  test-linux:
    strategy:
      matrix:
        image:
          - "ubuntu-22.04"
          - "ubuntu-24.04"
          - "macos-14"
          - "macos-15"
          - "macos-26"
          - "windows-2022"
          - "windows-2025"
        force:
          - 'true'
          - 'false'
        version:
          - '1.7'
          - '1.7.1'
          - '1.8.0'
        include:
          - image: "ubuntu-22.04"
            version: '1.6'
            force: true
          - image: "ubuntu-22.04"
            version: '1.6'
            force: false
          - image: "ubuntu-22.04"
            version: '1.5'
            force: true
          - image: "ubuntu-22.04"
            version: '1.5'
            force: false

          - image: "ubuntu-24.04"
            version: '1.6'
            force: true
          - image: "ubuntu-24.04"
            version: '1.6'
            force: false
          - image: "ubuntu-24.04"
            version: '1.5'
            force: true
          - image: "ubuntu-24.04"
            version: '1.5'
            force: false

          - image: "windows-2022"
            version: '1.6'
            force: true
          - image: "windows-2022"
            version: '1.6'
            force: false
          - image: "windows-2022"
            version: '1.5'
            force: true
          - image: "windows-2022"
            version: '1.5'
            force: false

          - image: "windows-2025"
            version: '1.6'
            force: true
          - image: "windows-2025"
            version: '1.6'
            force: false
          - image: "windows-2025"
            version: '1.5'
            force: true
          - image: "windows-2025"
            version: '1.5'
            force: false

    name: "Test Action - (img: ${{ matrix.image }}; version: ${{ matrix.version }}; force: ${{ matrix.force }})"
    runs-on: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup jq
        id: install-jq
        uses: ./
        with:
          version: '${{ matrix.version }}'
          force: '${{ matrix.force }}'

      - name: Check jq - Unix-ish
        if: (runner.os == 'Linux' || runner.os == 'macOS') && matrix.force == 'true'
        # language=sh
        run: |
          _err=
          _which="$(which jq)"
          _vers="$(jq --version)"
          if [[ "${_which}" != "$RUNNER_TOOL_CACHE/jq/jq" ]]; then
            echo "jq found at unexpected path."
            echo "  Expected:   \"$RUNNER_TOOL_CACHE/jq/jq\""
            echo "  Actual:     \"${_which}\""
            _err=1
          fi
          if [[ "${_vers}" != 'jq-${{ matrix.version }}' ]]; then
            echo "jq --version returned unexpected value"
            echo '  Expected:   "jq-${{ matrix.version }}"'
            echo "  Actual:     \"${_vers}\""
            _err=1
          fi
          if [ -n "${_err}" ]; then exit 1; fi;

      - name: Check Outputs - Unix-ish
        if: runner.os == 'Linux' || runner.os == 'macOS'
        # language=sh
        run: |
          if [[ '${{ matrix.force }}' == 'true' ]]; then
            # enabling "force" must result in an install
            if [[ '${{ steps.install-jq.outputs.installed }}' != 'true' ]]; then
              echo 'Unexpected value for "installed":'
              echo 'Expected:   "true"'
              echo 'Actual:     "${{ steps.install-jq.outputs.installed }}"'
              exit 1
            fi
          else
            if [[ '${{ steps.install-jq.outputs.found }}' == 'true' ]]; then
              # if found, must not be installed without force
              if [[ '${{ steps.install-jq.outputs.installed }}' != 'false' ]]; then
                echo 'Unexpected value for "installed":'
                echo 'Expected:   "false"'
                echo 'Actual:     "${{ steps.install-jq.outputs.installed }}"'
                exit 1
              fi
            else
              # if not found, must be installed
              if [[ '${{ steps.install-jq.outputs.installed }}' != 'true' ]]; then
                echo 'Unexpected value for "installed":'
                echo 'Expected:   "true"'
                echo 'Actual:     "${{ steps.install-jq.outputs.installed }}"'
                exit 1
              fi
            fi
          fi

      - name: Check jq - Windows-ish
        if: runner.os == 'Windows' && matrix.force == 'true'
        # language=powershell
        run: |
          Get-Command "jq.exe"
          $_cmd={jq.exe --version }
          $_vers=jq.exe --version 2>&1
          if ( "${_vers}" -ne "jq-${{ matrix.version }}" -and "${_vers}" -ne "jq-${{ matrix.version }}-dirty" )
          {
              Write-Host "jq.exe --version returned unexpected value"
              Write-Host "  Expected:   jq-${{ matrix.version }}"
              Write-Host "  Actual:     ${_vers}"
              exit 1
          }

      - name: Check Outputs - Windows-ish
        if: runner.os == 'Windows'
        shell: powershell
        # language=powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $_installed='${{ steps.install-jq.outputs.installed }}'
          if ("${{ matrix.force }}" -eq "true")
          {
              # enabling "force" must result in an install
              if ("${{ steps.install-jq.outputs.installed }}" -ne "true")
              {
                  Write-Host "Unexpected value for installed"
                  Write-Host "Expected:   true"
                  Write-Host "Actual:     ${{ steps.install-jq.outputs.installed }}"
                  exit 1
              }
          }
          else
          {
              if ("${{ steps.install-jq.outputs.found }}" -eq "true")
              {
                  # if found, must not be installed without force
                  if ("${{ steps.install-jq.outputs.installed }}" -ne "false")
                  {
                      Write-Host "Unexpected value for installed"
                      Write-Host "Expected:  false"
                      Write-Host "Actual:    ${{ steps.install-jq.outputs.installed }}"
                      exit 1
                  }
              }
              else
              {
                  # if not found, must be installed
                  if ("${{ steps.install-jq.outputs.installed }}" -ne "true") {
                      Write-Host "Unexpected value for installed"
                      Write-Host "Expected:  true"
                      Write-Host "Actual:    ${{ steps.install-jq.outputs.installed }}"
                      exit 1
                  }
              }
          }
  test-container:
    strategy:
      matrix:
        image:
          - "ubuntu-24.04"
          - "ubuntu-22.04"
        force:
          - 'true'
          - 'false'
        version:
          - '1.5'
          - '1.6'
          - '1.7'
          - '1.7.1'
          - '1.8.0'
    name: "Test Action (Container) - (img: ${{ matrix.image }}; version: ${{ matrix.version }}; force: ${{ matrix.force }})"
    runs-on: '${{ matrix.image }}'
    container:
      image: node:24
    steps:
      - uses: actions/checkout@v7

      - name: Setup jq
        id: install-jq
        uses: ./
        with:
          version: '${{ matrix.version }}'
          force: '${{ matrix.force }}'

      - name: Check jq
        # language=sh
        run: |
          _which="$(which jq)"
          _vers="$(jq --version)"
          if [[ "${_which}" != "$RUNNER_TOOL_CACHE/jq/jq" ]]; then
            echo "jq found at unexpected path."
            echo "  Expected:   \"$RUNNER_TOOL_CACHE/jq/jq\""
            echo "  Actual:     \"${_which}\""
            exit 1
          fi
          if [[ "${_vers}" != 'jq-${{ matrix.version }}' ]]; then
            echo "jq --version returned unexpected value"
            echo '  Expected:   "jq-${{ matrix.version }}"'
            echo "  Actual:     \"${_vers}\""
            exit 1
          fi

      - name: Check Outputs
        # language=sh
        run: |
          if [[ '${{ matrix.force }}' == 'true' ]]; then
            # enabling "force" must result in an install
            if [[ '${{ steps.install-jq.outputs.installed }}' != 'true' ]]; then
              echo 'Unexpected value for "installed":'
              echo 'Expected:   "true"'
              echo 'Actual:     "${{ steps.install-jq.outputs.installed }}"'
              exit 1
            fi
          else
            if [[ '${{ steps.install-jq.outputs.found }}' == 'true' ]]; then
              # if found, must not be installed without force
              if [[ '${{ steps.install-jq.outputs.installed }}' != 'false' ]]; then
                echo 'Unexpected value for "installed":'
                echo 'Expected:   "false"'
                echo 'Actual:     "${{ steps.install-jq.outputs.installed }}"'
                exit 1
              fi
            else
              # if not found, must be installed
              if [[ '${{ steps.install-jq.outputs.installed }}' != 'true' ]]; then
                echo 'Unexpected value for "installed":'
                echo 'Expected:   "true"'
                echo 'Actual:     "${{ steps.install-jq.outputs.installed }}"'
                exit 1
              fi
            fi
          fi

  test-invalid-version:
    name: "Test Invalid Version Rejection - ${{ matrix.image }}"
    strategy:
      matrix:
        include:
          - image: "ubuntu-24.04"
            script: "scripts/unixish.sh"
          - image: "ubuntu-24.04"
            script: "scripts/unixish-17.sh"
          - image: "macos-15"
            script: "scripts/unixish.sh"
          - image: "macos-15"
            script: "scripts/unixish-17.sh"
          - image: "windows-2025"
            script: "scripts/windowsish.ps1"
          - image: "windows-2025"
            script: "scripts/windowsish-17.ps1"
    runs-on: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v7

      - name: Reject invalid version - Unix-ish
        if: runner.os != 'Windows'
        shell: sh
        run: |
          _failed=0
          for _bad_ver in '' '.' '..' '1' '1.' '.7' '1..7' '1.7.' 'abc' '1.6-dirty' '../../etc/passwd' '-n'; do
            JQ_VERSION="${_bad_ver}" \
            RUNNER_OS='Linux' \
            RUNNER_ARCH='X64' \
            RUNNER_TEMP='/tmp' \
            RUNNER_TOOL_CACHE='/tmp/tool-cache' \
            GITHUB_PATH='/tmp/github-path' \
              sh ${{ matrix.script }} 2>&1 && {
                echo "FAIL: script accepted invalid version '${_bad_ver}'"
                _failed=1
              } || echo "PASS: script rejected invalid version '${_bad_ver}'"
          done
          [ "${_failed}" -eq 0 ]

      - name: Reject invalid version - Windows-ish
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $failed = $false
          $badVersions = @('', '.', '..', '1', '1.', '.7', '1..7', '1.7.', 'abc', '1.6-dirty', '../../etc/passwd', '-n')
          foreach ($ver in $badVersions) {
              $env:JQ_VERSION       = $ver
              $env:RUNNER_ARCH      = 'X64'
              $env:RUNNER_TEMP      = $env:TEMP
              $env:RUNNER_TOOL_CACHE = $env:TEMP
              $env:GITHUB_PATH      = "$env:TEMP\github-path.txt"
              & powershell -NonInteractive -File ${{ matrix.script }} 2>&1 | Out-Null
              if ($LASTEXITCODE -eq 0) {
                  Write-Host "FAIL: script accepted invalid version '$ver'"
                  $failed = $true
              } else {
                  Write-Host "PASS: script rejected invalid version '$ver'"
              }
          }
          if ($failed) { exit 1 }
          exit 0

  unit-tests:
    name: "Unit Tests (sh) - ${{ matrix.os }}"
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - macos-14
          - macos-15
          - macos-26
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Version validation tests
        run: sh tests/unit/test-version-validation.sh

      - name: Arch mapping tests
        run: sh tests/unit/test-arch-mapping.sh
